<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Master Data Structures & Algorithms with DSA Sheet by Shwetank. Track your progress, solve curated problems, and ace your coding interviews.">
  <meta name="theme-color" content="#0a0a0a">
  <title>DSA Sheet — Master Algorithms, One Problem at a Time</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>

  <!-- ═══ LANDING PAGE ═══ -->
  <div id="landing-page" class="landing-page">
    <div class="landing-badge">Open Source DSA Tracker</div>

    <h1 class="landing-title">
      DSA <span class="accent">Sheet</span>
    </h1>

    <p class="landing-tagline">
      Master Data Structures & Algorithms, one problem at a time.
      Track your progress across 240+ curated problems.
    </p>

    <button id="google-login-btn" class="google-btn" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <p id="auth-error" style="display:none; color:#ef4444; margin-top:1rem; font-size:0.8125rem;">
      Login failed. Please try again.
    </p>

    <p class="landing-footer">Built with 💚 by Shwetank</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
