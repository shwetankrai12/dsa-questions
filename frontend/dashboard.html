<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your DSA preparation dashboard. Track progress across Data Structures, Interview Prep, System Design, and OOPs.">
  <meta name="theme-color" content="#0a0a0a">
  <title>Dashboard — DSA Sheet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-logo">DSA Sheet</a>
    <div class="navbar-right">
      <span id="nav-user-name" class="navbar-name"></span>
      <div id="nav-user-avatar" class="navbar-avatar"></div>
      <button class="navbar-logout" onclick="handleLogout()">logout</button>
    </div>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <main class="page-container">
    <div class="dashboard-header">
      <h1 class="dashboard-greeting" id="greeting">Hey, there</h1>
      <p class="dashboard-subtitle">Pick up where you left off.</p>
    </div>

    <div class="section-grid" id="section-grid">
      <div class="section-card skeleton" style="height:100px"></div>
      <div class="section-card skeleton" style="height:100px"></div>
      <div class="section-card skeleton" style="height:100px"></div>
      <div class="section-card skeleton" style="height:100px"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initDashboard();
    });
  </script>
</body>
</html>
