[build]
  publish = "frontend"
  # No build command needed for vanilla HTML/CSS/JS

# ── API Proxy (all /api/* requests → Render backend) ──
[[redirects]]
  from = "/api/*"
  to = "https://dsa-questions-liz9.onrender.com/api/:splat"
  status = 200
  force = true

# ── SPA Routing — serve index.html for all non-file routes ──
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/section"
  to = "/section.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Headers for security ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
